name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "index.html"
      - "assets/**"
      - ".github/workflows/pages.yml"
      - "data/**"
      - "artifacts/**"
      - "*.csv"
      - "*.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p _site

          if [ ! -f index.html ]; then
            echo "ERROR: index.html was not found at the repository root."
            echo "Upload index.html to the root of the repo, then rerun this workflow."
            exit 1
          fi

          cp index.html _site/index.html

          if [ -d assets ]; then
            cp -r assets _site/assets
          fi

          if [ -d data ]; then
            cp -r data _site/data
          fi

          if [ -d artifacts ]; then
            cp -r artifacts _site/artifacts
          fi

          if [ -f favicon.ico ]; then
            cp favicon.ico _site/favicon.ico
          fi

          touch _site/.nojekyll

          echo "Prepared static site contents:"
          find _site -maxdepth 4 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
