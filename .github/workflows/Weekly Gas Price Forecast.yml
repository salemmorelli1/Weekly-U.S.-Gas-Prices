name: Weekly Gas Price Forecast

# ─────────────────────────────────────────────────────────────────────────────
# Runs every Monday at 14:00 UTC (10:00 AM ET).
# EIA releases weekly gas price data on Monday mornings — we wait until 10am
# to ensure the data is live before fetching and forecasting.
#
# Secrets required (set in GitHub → Settings → Secrets → Actions):
#   FRED_API_KEY      — free at https://fred.stlouisfed.org/docs/api/api_key.html
#   EIA_API_KEY       — free at https://www.eia.gov/opendata/register.php
#   COLLECTAPI_KEY    — from https://collectapi.com
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # Every Monday at 14:00 UTC = 10:00 AM ET (EST) / 11:00 AM EDT
    - cron: "0 14 * * 1"

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run even if not Monday"
        required: false
        default: "false"
      with_backfill:
        description: "Run backfill_realized after forecast"
        required: false
        default: "true"
      skip_lstm:
        description: "Skip LSTM sleeve (faster run)"
        required: false
        default: "false"

env:
  GASPRICE_ROOT: ${{ github.workspace }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
  COLLECTAPI_KEY: ${{ secrets.COLLECTAPI_KEY }}
  PYTHONUNBUFFERED: "1"

jobs:
  forecast:
    name: Run Weekly Gas Price Forecast
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write   # needed to commit prediction_log.csv back to repo

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Validate API keys ───────────────────────────────────────────────
      - name: Validate API key presence
        run: |
          echo "Checking required API keys..."
          if [ -z "$FRED_API_KEY" ]; then
            echo "::warning::FRED_API_KEY is not set. FRED data will be skipped."
          else
            echo "FRED_API_KEY: set"
          fi
          if [ -z "$EIA_API_KEY" ]; then
            echo "::warning::EIA_API_KEY is not set. EIA direct data will be skipped."
          else
            echo "EIA_API_KEY: set"
          fi
          if [ -z "$COLLECTAPI_KEY" ]; then
            echo "::warning::COLLECTAPI_KEY is not set. Live prices will be skipped."
          else
            echo "COLLECTAPI_KEY: set"
          fi

      # ── 5. Create artifact directories ────────────────────────────────────
      - name: Create artifact directories
        run: |
          mkdir -p artifacts_part0 artifacts_part1 artifacts_part2 \
                   artifacts_part2a artifacts_part2b artifacts_part3 \
                   artifacts_part6 artifacts_part9 logs

      # ── 6. Restore cached artifacts ───────────────────────────────────────
      - name: Restore model cache
        uses: actions/cache@v4
        with:
          path: |
            artifacts_part2/gas_part2_models.pkl
            artifacts_part2b/gas_xgb_models.pkl
            artifacts_part6/gas_regime_model.pkl
          key: gas-models-${{ runner.os }}-${{ hashFiles('gas_part2_forecaster.py', 'gas_part6_regime_engine.py') }}
          restore-keys: |
            gas-models-${{ runner.os }}-

      # ── 7. Part 0: Data Infrastructure ────────────────────────────────────
      - name: Part 0 — Data Infrastructure (FRED + yfinance)
        run: python gas_part0_data_infrastructure.py
        env:
          GASPRICE_ROOT: ${{ github.workspace }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # ── 8. Part 0b: CollectAPI Live Prices ────────────────────────────────
      - name: Part 0b — CollectAPI Live Prices (optional)
        run: python gas_part0b_collectapi_fetcher.py || echo "::warning::Part0b failed — continuing without live CollectAPI data"
        env:
          COLLECTAPI_KEY: ${{ secrets.COLLECTAPI_KEY }}

      # ── 9. Part 0c: EIA API Direct ────────────────────────────────────────
      - name: Part 0c — EIA Direct Fetcher (optional)
        run: python gas_part0c_eia_fetcher.py || echo "::warning::Part0c failed — continuing without EIA API data"
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

      # ── 10. Part 6: Regime Engine ─────────────────────────────────────────
      - name: Part 6 — Regime Engine (HMM)
        run: python gas_part6_regime_engine.py

      # ── 11. Part 1: Feature Builder ───────────────────────────────────────
      - name: Part 1 — Feature Builder
        run: python gas_part1_feature_builder.py

      # ── 12. Part 2: Sklearn Ensemble ──────────────────────────────────────
      - name: Part 2 — Sklearn Ensemble Forecaster
        run: python gas_part2_forecaster.py

      # ── 13. Part 2b: XGBoost Sleeve ───────────────────────────────────────
      - name: Part 2b — XGBoost Sleeve (optional)
        run: python gas_part2b_xgb_ensemble.py || echo "::warning::Part2b XGBoost sleeve failed — continuing"

      # ── 14. Part 2a: LSTM Sleeve ──────────────────────────────────────────
      - name: Part 2a — LSTM Sleeve (optional)
        if: ${{ github.event.inputs.skip_lstm != 'true' }}
        run: python gas_part2a_lstm_sleeve.py || echo "::warning::Part2a LSTM sleeve failed — continuing"

      # ── 15. Part 3: Governance + Fusion ───────────────────────────────────
      - name: Part 3 — Governance and Fusion
        run: python gas_part3_governance.py

      # ── 16. Backfill Realized ─────────────────────────────────────────────
      - name: Backfill Realized Prices
        if: ${{ github.event.inputs.with_backfill != 'false' }}
        run: python gas_backfill_realized.py || echo "::warning::Backfill failed — prediction log may not have realized prices yet"
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

      # ── 17. Part 9: Live Attribution ──────────────────────────────────────
      - name: Part 9 — Live Attribution
        run: python gas_part9_live_attribution.py

      # ── 18. Print latest forecast ─────────────────────────────────────────
      - name: Print latest forecast
        run: |
          echo "=== LATEST WEEKLY FORECAST ==="
          python -c "
          import json, os
          from pathlib import Path
          root = os.environ.get('GASPRICE_ROOT', '.')
          summary = Path(root) / 'artifacts_part3' / 'gas_part3_summary.json'
          if summary.exists():
              with open(summary) as f:
                  s = json.load(f)
              pred = s.get('latest_prediction', {})
              print(f'Decision date:  {pred.get(\"decision_date\", \"N/A\")}')
              print(f'Target date:    {pred.get(\"target_date\", \"N/A\")}')
              print(f'Fusion forecast: \${pred.get(\"pred_fusion\", \"N/A\"):.3f}/gal')
              print(f'Confidence:     {pred.get(\"confidence\", \"N/A\")}')
              print(f'Regime:         {pred.get(\"regime\", \"N/A\")}')
              print(f'Active sleeves: {s.get(\"active_sleeves\", [])}')
          else:
              print('Summary file not found.')
          "
          echo ""
          echo "=== MODEL HEALTH ==="
          python -c "
          import json, os
          from pathlib import Path
          root = os.environ.get('GASPRICE_ROOT', '.')
          report = Path(root) / 'artifacts_part9' / 'live_attribution_report.json'
          if report.exists():
              with open(report) as f:
                  r = json.load(f)
              health = r.get('model_health', {})
              print(f'Health status:  {health.get(\"health_status\", \"N/A\")}')
              print(f'Realized obs:   {r.get(\"n_realized\", 0)}')
              metrics = r.get('all_time_metrics', {})
              mae = metrics.get('mae')
              mape = metrics.get('mape')
              if mae: print(f'All-time MAE:   \${mae:.4f}/gal')
              if mape: print(f'All-time MAPE:  {mape:.2f}%')
              dm = r.get('diebold_mariano', {})
              print(f'DM test:        {dm.get(\"dm_interpretation\", \"N/A\")}')
          else:
              print('Attribution report not found.')
          "

      # ── 19. Upload artifacts ──────────────────────────────────────────────
      - name: Upload forecast artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gas-forecast-${{ github.run_id }}
          retention-days: 90
          path: |
            artifacts_part3/prediction_log.csv
            artifacts_part3/gas_part3_summary.json
            artifacts_part3/gas_fusion_tape.csv
            artifacts_part9/live_attribution_report.json
            artifacts_part9/live_attribution_tape.csv
            artifacts_part2/gas_part2_summary.json
            artifacts_part2b/gas_part2b_summary.json
            artifacts_part2a/gas_part2a_summary.json
            artifacts_part6/gas_regime_meta.json

      # ── 20. Commit prediction log back to repo ────────────────────────────
      - name: Commit prediction log to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Stage prediction log and summary artifacts for commit
          mkdir -p docs
          cp artifacts_part3/prediction_log.csv docs/prediction_log.csv 2>/dev/null || true
          cp artifacts_part3/gas_part3_summary.json docs/gas_part3_summary.json 2>/dev/null || true
          cp artifacts_part9/live_attribution_report.json docs/live_attribution_report.json 2>/dev/null || true
          cp artifacts_part6/gas_regime_meta.json docs/gas_regime_meta.json 2>/dev/null || true
          cp artifacts_part2/gas_part2_summary.json docs/gas_part2_summary.json 2>/dev/null || true

          git add docs/ || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Weekly forecast $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push || echo "Push failed — check repository permissions"

  # ── Notify on failure ──────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: forecast
    if: failure()
    steps:
      - name: Report failure
        run: |
          echo "::error::Weekly gas price forecast pipeline FAILED."
          echo "Check the run log for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
